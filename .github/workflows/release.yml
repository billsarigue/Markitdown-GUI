name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-name: markitdown-x86_64-pc-windows-msvc.exe

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-name: markitdown-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Download sidecar binary
        shell: bash
        env:
          SIDECAR_URL_WINDOWS: ${{ secrets.SIDECAR_URL_WINDOWS }}
          SIDECAR_URL_LINUX: ${{ secrets.SIDECAR_URL_LINUX }}
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            curl -L "$SIDECAR_URL_WINDOWS" -o "src-tauri/binaries/${{ matrix.sidecar-name }}"
          else
            curl -L "$SIDECAR_URL_LINUX" -o "src-tauri/binaries/${{ matrix.sidecar-name }}"
            chmod +x "src-tauri/binaries/${{ matrix.sidecar-name }}"
          fi

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Markitdown GUI ${{ github.ref_name }}
          releaseBody: |
            ## Markitdown GUI ${{ github.ref_name }}

            Interface gráfica para o [MarkItDown](https://github.com/microsoft/markitdown) da Microsoft.
            Desenvolvido por **ZionLux**.

            ### Download
            - **Windows**: baixe o arquivo `.msi` ou `.exe`
            - **Linux**: baixe o `.AppImage`, `.deb` ou `.rpm`

            ### Nota
            Esta é uma versão beta. O recurso de arrastar arquivos pode não funcionar no Windows.
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }}

      - name: Build Tauri app (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Markitdown GUI ${{ github.ref_name }}
          releaseBody: |
            ## Markitdown GUI ${{ github.ref_name }}

            Interface gráfica para o [MarkItDown](https://github.com/microsoft/markitdown) da Microsoft.
            Desenvolvido por **ZionLux**.

            ### Download
            - **Windows**: baixe o arquivo `.msi` ou `.exe`
            - **Linux**: baixe o `.AppImage`, `.deb` ou `.rpm`

            ### Nota
            Esta é uma versão beta. O recurso de arrastar arquivos pode não funcionar no Windows.
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }} --bundles appimage,deb,rpm
